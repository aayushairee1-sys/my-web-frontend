<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Catalog | GSD Suppliers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050608;
            --primary: #ffb800;
            --card-bg: rgba(15, 17, 23, 0.85);
            --accent-green: #00e676;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 184, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 230, 118, 0.08) 0%, transparent 50%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            background: rgba(8, 10, 15, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1.5px;
        }

        .logo span { color: var(--primary); }

        nav a {
            color: #8a92a6;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, nav a.active { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .page-title span { color: var(--primary); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 30px;
        }

        /* Product Card Styles */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(255, 184, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            font-weight: 700;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            color: #8a92a6;
        }

        .status { color: var(--accent-green); }

        .image-box {
            height: 130px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .image-box i {
            font-size: 50px;
            transition: transform 0.3s;
        }

        .card:hover .image-box i {
            transform: scale(1.15) rotate(5deg);
        }

        .icon-ff { color: #ff4757; filter: drop-shadow(0 0 10px rgba(255, 71, 87, 0.5)); }
        .icon-pubg { color: #ffa502; filter: drop-shadow(0 0 10px rgba(255, 165, 0, 0.5)); }
        .icon-ml { color: #2ed573; filter: drop-shadow(0 0 10px rgba(46, 213, 115, 0.5)); }
        .icon-netflix { color: #e50914; filter: drop-shadow(0 0 10px rgba(229, 9, 20, 0.5)); }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #12151e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            outline: none;
            margin-bottom: 20px;
            cursor: pointer;
        }

        select:focus { border-color: var(--primary); }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .price-label { font-size: 11px; color: #8a92a6; }
        .price {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
        }

        .buy-btn {
            background: var(--primary);
            color: #000;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <script>
        function updatePrice(id) {
            var select = document.getElementById(id + '-select');
            var price = document.getElementById(id + '-price');

        }

</body>
</html>
